<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edytuj wpis - BibEngine</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
</head>
<body>
<div class="d-flex">
    <div th:replace="fragments/sidebar.html :: sidebar"></div>
    <div class="container">
<h1>Edytuj wpis</h1>
<div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
<form th:action="@{'/bibliography/' + ${bibId} + '/entries/' + ${entry.id}}" method="post">
    <div class="mb-3">
        <label class="form-label">Tytuł</label>
        <input class="form-control" name="title" th:value="${entry.title}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Autorzy</label>
        <input class="form-control" name="authors" th:value="${entry.authors}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Rok</label>
        <input type="number" class="form-control" name="year" th:value="${entry.year}">
    </div>
    <div class="mb-3">
        <label class="form-label">Journal</label>
        <input class="form-control" name="journal" th:value="${entry.journal}">
    </div>
    <div class="mb-3">
        <label class="form-label">DOI</label>
        <input class="form-control" name="doi" th:value="${entry.doi}">
    </div>
    <div class="mb-3">
        <label class="form-label">Typ</label>
        <input class="form-control" name="type" th:value="${entry.type}">
    </div>
    <button class="btn btn-primary">Zapisz</button>
</form>
<p><a th:href="@{'/bibliography/' + ${bibId}}" class="btn btn-link">Powrót</a></p>
    </div>
</div>
</body>
</html>
