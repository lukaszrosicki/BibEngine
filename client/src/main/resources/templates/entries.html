<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Wpisy - BibEngine</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
</head>
<body class="container">
<h1 th:text="${bibliography.name}">Bibliografia</h1>
<p th:text="${bibliography.comment}"></p>
<div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
<table class="table">
    <thead>
    <tr><th>Tytuł</th><th>Autorzy</th><th>Rok</th><th>Journal</th><th>DOI</th></tr>
    </thead>
    <tbody>
    <tr th:each="e : ${entries}">
        <td th:text="${e.title}"></td>
        <td th:text="${e.authors}"></td>
        <td th:text="${e.year}"></td>
        <td th:text="${e.journal}"></td>
        <td th:text="${e.doi}"></td>
    </tr>
    </tbody>
</table>
<h2>Dodaj wpis</h2>
<form method="post" th:action="@{'/bibliography/' + ${bibliography.id} + '/entries'}">
    <div class="mb-3">
        <label class="form-label">Tytuł</label>
        <input class="form-control" name="title" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Autorzy</label>
        <input class="form-control" name="authors" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Rok</label>
        <input type="number" class="form-control" name="year">
    </div>
    <div class="mb-3">
        <label class="form-label">Journal</label>
        <input class="form-control" name="journal">
    </div>
    <div class="mb-3">
        <label class="form-label">DOI</label>
        <input class="form-control" name="doi">
    </div>
    <div class="mb-3">
        <label class="form-label">Typ</label>
        <input class="form-control" name="type" value="article">
    </div>
    <button class="btn btn-success">Dodaj</button>
</form>
<h2>Dodaj po DOI</h2>
<form method="post" th:action="@{'/bibliography/' + ${bibliography.id} + '/entries/by-doi'}">
    <div class="mb-3">
        <label class="form-label">DOI</label>
        <input class="form-control" name="doi" required>
    </div>
    <button class="btn btn-secondary">Pobierz</button>
</form>
<p><a th:href="@{/bibliography}" class="btn btn-link">Powrót</a></p>
</body>
</html>
