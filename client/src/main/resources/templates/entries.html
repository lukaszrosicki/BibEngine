<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Wpisy - BibEngine</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
</head>
<body>
<div class="d-flex">
    <div th:replace="fragments/sidebar.html :: sidebar"></div>
    <div class="container">
<h1 th:text="${bibliography.name}">Bibliografia</h1>
<p th:text="${bibliography.comment}"></p>
<div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
<form method="post" th:action="@{'/bibliography/' + ${bibliography.id} + '/entries'}">
<table class="table">
    <thead>
    <tr><th>Tytuł</th><th>Autorzy</th><th>Rok</th><th>Journal</th><th>DOI</th><th>BibKey</th><th></th></tr>
    <tr>
        <td><input class="form-control" name="title" required></td>
        <td><input class="form-control" name="authors" required></td>
        <td><input type="number" class="form-control" name="year"></td>
        <td><input class="form-control" name="journal"></td>
        <td><input class="form-control" name="doi"></td>
        <td><input class="form-control" name="type" value="article"></td>
        <td><button class="btn btn-success btn-sm">Dodaj</button></td>
    </tr>
    </thead>
    <tbody>
    <tr th:each="e : ${entries}">
        <td th:text="${e.title}" th:classappend="${#strings.isEmpty(e.title)} ? 'table-danger' : ''"></td>
        <td th:text="${e.authors}" th:classappend="${#strings.isEmpty(e.authors)} ? 'table-danger' : ''"></td>
        <td th:text="${e.year}"></td>
        <td th:text="${e.journal}"></td>
        <td th:text="${e.doi}"></td>
        <td th:text="${e.bibtexKey}"></td>
        <td class="text-nowrap">
            <a th:href="@{'/bibliography/' + ${bibliography.id} + '/entries/' + ${e.id} + '/edit'}" class="btn btn-sm btn-primary">Edytuj</a>
            <form th:action="@{'/bibliography/' + ${bibliography.id} + '/entries/' + ${e.id} + '/delete'}" method="post" class="d-inline">
                <button class="btn btn-sm btn-danger">Usuń</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</form>
<div th:if="${missing != null and !#lists.isEmpty(missing)}" class="mt-3">
    <h3>Brak wymaganych danych</h3>
    <table class="table table-sm">
        <thead><tr><th>Tytuł</th><th>Autorzy</th></tr></thead>
        <tbody>
        <tr th:each="m : ${missing}">
            <td th:text="${m.title}"></td>
            <td th:text="${m.authors}"></td>
        </tr>
        </tbody>
    </table>
</div>
<h2>Dodaj z tekstu BibTeX</h2>
<form method="post" th:action="@{'/bibliography/' + ${bibliography.id} + '/entries/upload'}">
    <div class="mb-3">
        <textarea class="form-control" name="bibtex" rows="6" required></textarea>
    </div>
    <button class="btn btn-secondary">Wgraj</button>
</form>
<h2>Dodaj z pliku BibTeX</h2>
<form method="post" th:action="@{'/bibliography/' + ${bibliography.id} + '/entries/upload-file'}" enctype="multipart/form-data">
    <div class="mb-3">
        <input type="file" name="file" accept=".bib" class="form-control" required>
    </div>
    <button class="btn btn-secondary">Wgraj plik</button>
</form>
<p><a th:href="@{/bibliography}" class="btn btn-link">Powrót</a></p>
    </div>
</div>
</body>
</html>
